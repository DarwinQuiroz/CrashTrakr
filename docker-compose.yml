version: "3.9"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: crashtrakr_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "8000:8000"
        depends_on:
            - postgres
        networks:
            - laravel

    postgres:
        image: postgres:17
        container_name: laravel_postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: crashtrakr_db
            POSTGRES_USER: darwin_quiroz
            POSTGRES_PASSWORD: admin_DB123
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - laravel

    pgadmin:
        image: dpage/pgadmin4
        container_name: laravel_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: darquiroz@gmail.com
            PGADMIN_DEFAULT_PASSWORD: admin_DB123
        ports:
            - "5050:80"
        depends_on:
            - postgres
        networks:
            - laravel

networks:
    laravel:

volumes:
    postgres_data:
